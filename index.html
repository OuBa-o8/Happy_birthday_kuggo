<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日快樂</title>
    <link rel="stylesheet" href="style.css">
</head>

<body background="images/bg.png">

    <!-- 開場 -->
    <div class="intro" id="intro">
        <div class="gift" id="openBtn">
            <img src="images/icon_bow.png" class="gift-icon">
            <p>點我一下</p>
        </div>
    </div>

    <!-- ===== 主內容（一開始隱藏） ===== -->
    <div class="main hidden" id="mainContent">

        <!-- 角落動物 -->
        <div class="decorations">
            <img src="images/sugar_glider.png" class="corner1 top-right">
            <img src="images/dog.png" class="corner2 bottom-left">
            <img src="images/cat.png" class="corner3 bottom-right">
        </div>

        <!-- 彩花 -->
        <div class="confetti-container"></div>

        <!-- 卡片 -->
        <div class="container">

            <div class="card">
                <div class="card_title">
                <p style="font-size: 48px;">欸 生日了欸 🎂</p>
                <p style="font-size: 48px;">時間過得真快</p>
                <p style="font-size: 20px;">之前你說你喜歡收到卡片</p>
                <p style="font-size: 20px;">但我又不太會畫圖 字也醜</p>
                <p style="font-size: 20px;">所以我就做了一張自己風格的網頁卡片給你！</p>
                </div>
                <div class="content">
                    <p style="font-size: 64px;">生日快樂！</p>
                    <p style="font-size: 24px;">我也不太會寫卡片也不知該說啥</p>
                    <p style="font-size: 24px;">但我想說的就是</p>
                    <p style="font-size: 24px;">今天你最大！</p>
                    <p style="font-size: 24px;">希望你今天能吃到好吃的蛋糕！</p>
                    <p style="font-size: 24px;">也希望每天都可以開開心心的~</p>
                    <p style="font-size: 24px;">再次祝你生日快樂！</p>
                    <img src="images/meme.webp" height="50%" width="50%">
                    
                </div>
                <div class="foot">
                    <p style="font-size: 16px;">希望你每天都能開開心心的！</p>
                    <p style="font-size: 16px;">還沒回高雄的人敬上</p>
                    <p style="font-size: 12px;">圖片我AI生的但是AI不知道蜜袋鼯是什麼所以花好多時間才生出來哈哈</p>
                </div>
            </div>


        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
